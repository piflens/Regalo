<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nadia ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/2764.png">
</head>
<body>
  <audio id="type-sound" src="https://upload.wikimedia.org/wikipedia/commons/4/47/Typewriter_sound_effect.wav" preload="auto"></audio>

    <div id="particles-js"></div>

    <div class="glass-card">
        <div class="counter">DÍA <span id="day-num"></span> DE 365</div>
        <h1>Nadia</h1>
        <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px;">
            Este regalo es para ti por todo lo que me has ayudado a crecer.
        </p>

        <div class="stanley-container" onclick="iniciarEfecto()">🥤</div>

        <div class="message-box">
            <span id="daily-message">Toca el termo para tu mensaje...</span>
            <span id="cursor" class="cursor"></span>
        </div>

        <p class="footer-text">Escanea tu termo cada día</p>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
